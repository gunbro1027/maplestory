<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 자산 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>

    <header class="site-header">
      <div class="container header-inner">
        <span class="logo">내 자산 관리</span>
        <div class="header-summary">
          <div class="summary-item">
            <span class="summary-label">순자산</span>
            <strong id="header-networth">₩0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">월 저축</span>
            <strong id="header-saving">₩0</strong>
          </div>
        </div>
      </div>
    </header>

    <main class="container main-grid">

      <!-- 월 수입 -->
      <section class="card income-card">
        <h2 class="section-title">월 수입</h2>
        <div class="form-row">
          <input type="text" id="income-name" placeholder="수입명 (예: 월급, 부업)" />
          <input type="text" id="income-amount" placeholder="금액 (예: 3,000,000)" oninput="formatInput(this)" />
          <button class="btn primary" onclick="addIncome()">추가</button>
        </div>
        <div id="income-list" class="item-list"></div>
      </section>

      <!-- 요약 카드 -->
      <section class="summary-cards">
        <div class="stat-card green">
          <span class="stat-label">총 자산</span>
          <strong id="total-assets">₩0</strong>
        </div>
        <div class="stat-card red">
          <span class="stat-label">총 부채</span>
          <strong id="total-liabilities">₩0</strong>
        </div>
        <div class="stat-card blue">
          <span class="stat-label">순자산</span>
          <strong id="net-worth">₩0</strong>
        </div>
        <div class="stat-card orange">
          <span class="stat-label">월 상환액</span>
          <strong id="monthly-payment">₩0</strong>
        </div>
      </section>

      <!-- 자산 섹션 -->
      <section class="card">
        <h2 class="section-title">자산</h2>
        <div class="form-row">
          <input type="text" id="asset-name" placeholder="자산명 (예: 국민은행)" />
          <select id="asset-category">
            <option value="현금">현금</option>
            <option value="주식">주식</option>
            <option value="부동산">부동산</option>
            <option value="암호화폐">암호화폐</option>
            <option value="기타">기타</option>
          </select>
          <input type="text" id="asset-amount" placeholder="금액 (예: 1,000,000)" oninput="formatInput(this)" />
          <button class="btn primary" onclick="addAsset()">추가</button>
        </div>
        <div id="asset-list" class="item-list"></div>
      </section>

      <!-- 부채 섹션 -->
      <section class="card">
        <h2 class="section-title">부채</h2>
        <div class="form-row">
          <input type="text" id="liability-name" placeholder="부채명 (예: 주택담보대출)" />
          <input type="text" id="liability-total" placeholder="총 부채액 (예: 50,000,000)" oninput="formatInput(this)" />
          <input type="text" id="liability-monthly" placeholder="월 상환액 (예: 500,000)" oninput="formatInput(this)" />
          <input type="number" id="liability-rate" placeholder="연 이자율 (%)" step="0.1" min="0" max="100" class="input-narrow" />
          <button class="btn danger" onclick="addLiability()">추가</button>
        </div>
        <div id="liability-list" class="item-list"></div>
      </section>

      <!-- 투자 섹션 -->
      <section class="card">
        <h2 class="section-title">투자 계획</h2>
        <div class="form-row">
          <input type="text" id="invest-name" placeholder="투자명 (예: QQQ, S&P500)" />
          <select id="invest-preset" onchange="applyPreset()">
            <option value="">직접 입력</option>
            <option value="15">QQQ (연 ~15%)</option>
            <option value="10">S&P500 (연 ~10%)</option>
            <option value="7">글로벌 ETF (연 ~7%)</option>
            <option value="4">채권 (연 ~4%)</option>
            <option value="2">예적금 (연 ~2%)</option>
          </select>
          <input type="number" id="invest-rate" placeholder="연 수익률 (%)" step="0.1" min="0" class="input-narrow" />
          <input type="text" id="invest-monthly" placeholder="월 투자금액" oninput="formatInput(this)" />
          <button class="btn primary" onclick="addInvestment()">추가</button>
        </div>
        <div id="invest-list" class="item-list"></div>
      </section>

      <!-- 투자 성장 그래프 -->
      <section class="card">
        <h2 class="section-title">총 자산 성장 예측 (연도별)</h2>
        <div class="invest-year-btns">
          <button class="year-btn active" onclick="setInvestYears(10, this)">10년</button>
          <button class="year-btn" onclick="setInvestYears(20, this)">20년</button>
          <button class="year-btn" onclick="setInvestYears(30, this)">30년</button>
        </div>
        <canvas id="invest-chart"></canvas>
      </section>

      <!-- 그래프 섹션 -->
      <section class="card">
        <h2 class="section-title">순자산 증가 예측 (연도별)</h2>
        <canvas id="growth-chart"></canvas>
      </section>

      <!-- 월별 요약 -->
      <section class="card monthly-summary">
        <h2 class="section-title">월별 재정 요약</h2>
        <div class="summary-grid">
          <div class="summary-row">
            <span>월 수입</span>
            <strong id="sum-income" class="green-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>월 상환액</span>
            <strong id="sum-payment" class="red-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>월 이자 합계</span>
            <strong id="sum-interest" class="red-text">₩0</strong>
          </div>
          <div class="summary-row highlight">
            <span>월 저축 가능액</span>
            <strong id="sum-savings">₩0</strong>
          </div>
          <div class="summary-row">
            <span>1년 후 예상 순자산</span>
            <strong id="sum-1year" class="blue-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>3년 후 예상 순자산</span>
            <strong id="sum-3year" class="blue-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>5년 후 예상 순자산</span>
            <strong id="sum-5year" class="blue-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>7년 후 예상 순자산</span>
            <strong id="sum-7year" class="blue-text">₩0</strong>
          </div>
          <div class="summary-row">
            <span>10년 후 예상 순자산</span>
            <strong id="sum-10year" class="blue-text">₩0</strong>
          </div>
        </div>
      </section>

    </main>

    <script src="./src/scripts/main.js"></script>
  </body>
</html>
