<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>건브로 - 메이플스토리 캐릭터 조회</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles/maple.css" />
    <script type="text/javascript" src="https://openapi.nexon.com/js/analytics.js?app_id=259693" async></script>
  </head>
  <body>
    <div class="bg-glow"></div>

    <header class="site-header">
      <div class="container">
        <span class="logo">건브로</span>
        <span class="logo-sub">메이플스토리 캐릭터 조회</span>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1 class="hero-title">캐릭터 검색</h1>
        <p class="hero-desc">메이플스토리 캐릭터 정보를 조회하세요</p>
        <div class="search-box">
          <input
            type="text"
            id="char-input"
            class="search-input"
            placeholder="캐릭터 이름을 입력하세요"
            autocomplete="off"
          />
          <button class="search-btn" onclick="searchCharacter()">검색</button>
        </div>
      </section>

      <section id="result-section" class="result-section hidden">
        <div id="error-box" class="error-box hidden">
          <span id="error-msg"></span>
        </div>
        <div id="char-card" class="char-card hidden">
          <div class="char-image-wrap">
            <img id="char-image" src="" alt="캐릭터 이미지" />
          </div>
          <div class="char-info">
            <div class="char-name" id="char-name"></div>
            <div class="char-badges">
              <span class="badge world" id="char-world"></span>
              <span class="badge class" id="char-class"></span>
            </div>
            <div class="char-stats">
              <div class="stat-item">
                <span class="stat-label">레벨</span>
                <span class="stat-value" id="char-level"></span>
              </div>
              <div class="stat-item">
                <span class="stat-label">경험치</span>
                <span class="stat-value" id="char-exp"></span>
              </div>
              <div class="stat-item">
                <span class="stat-label">인기도</span>
                <span class="stat-value" id="char-popularity"></span>
              </div>
              <div class="stat-item">
                <span class="stat-label">길드</span>
                <span class="stat-value" id="char-guild"></span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./src/scripts/maple.js"></script>
  </body>
</html>
